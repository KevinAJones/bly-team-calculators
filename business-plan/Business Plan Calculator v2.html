<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Bly Team — Business Plan Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   THE BLY TEAM — brand system (matches Mortgage & PITI Calculator)
   Display: Oswald (condensed) · Accent: Playfair Display (serif)
   UI/body: Plus Jakarta Sans · Navy + royal blue on textured off-white
   ============================================================ */
:root{
  --f-display:"Oswald",system-ui,sans-serif;
  --f-serif:"Playfair Display",Georgia,serif;
  --f-body:"Plus Jakarta Sans",system-ui,sans-serif;

  --navy-950:#091d38;
  --navy-900:#0b2747;
  --navy-800:#0e2f57;
  --navy-700:#123461;
  --navy-600:#16407a;
  --royal:#1f60aa;
  --royal-bright:#2f78c8;
  --royal-soft:#6ea0d6;

  /* segment colors */
  --seg-keep:#1d7d54;
  --seg-exp:#1f60aa;
  --seg-office:#4f8bcf;
  --seg-ref:#c79a3e;

  --bg:#e9edf2;
  --bg-tex-a:#eef1f5;
  --bg-tex-b:#e3e8ef;
  --panel:#ffffff;
  --panel-2:#f3f6fa;
  --ink:#0d2543;
  --ink-soft:#4c607a;
  --ink-faint:#8395ab;
  --line:#e3e9f0;
  --line-strong:#cdd9e6;
  --field:#ffffff;
  --field-line:#d2dde9;
  --shadow:0 1px 2px rgba(11,39,71,.05),0 14px 34px -18px rgba(11,39,71,.24);
  --shadow-lg:0 2px 5px rgba(9,29,56,.06),0 30px 64px -26px rgba(9,29,56,.32);
  --radius:20px;
  --radius-sm:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--f-body);
  color:var(--ink);
  background:
    radial-gradient(circle at 18% 12%, var(--bg-tex-a), transparent 48%),
    radial-gradient(circle at 86% 0%, var(--bg-tex-a), transparent 42%),
    linear-gradient(160deg, var(--bg-tex-a), var(--bg-tex-b));
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
  font-size:16.5px;
  font-variant-numeric:tabular-nums;
}
#root{min-height:100vh;}
input,button,select{font-family:inherit;color:inherit;}
button{cursor:pointer;border:none;background:none;}

.app-wrap{max-width:1240px;margin:0 auto;padding:0 18px 96px;}

/* ---- header ---- */
.app-head{
  background:linear-gradient(135deg,#091f3b 0%,#10325e 52%,#184a8c 100%);
  color:#fff;border-radius:0 0 var(--radius) var(--radius);
  padding:26px 32px 28px;position:relative;overflow:hidden;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:24px;
}
.app-head::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 90% -20%, rgba(120,170,230,.28), transparent 46%),
    radial-gradient(circle at 8% 120%, rgba(31,96,170,.4), transparent 50%);
  pointer-events:none;
}
.brand-lockup{display:flex;align-items:center;gap:18px;min-width:0;position:relative;z-index:1;}
.brand-lockup img.logo{height:50px;width:auto;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25));}
.brand-div{width:1px;height:46px;background:rgba(255,255,255,.28);flex:none;}
.brand-exp{display:flex;flex-direction:column;line-height:1.05;}
.brand-exp .ex1{font-family:var(--f-display);font-weight:600;font-size:17px;letter-spacing:.02em;}
.brand-exp .ex2{font-size:9.5px;letter-spacing:.36em;text-transform:uppercase;opacity:.74;font-weight:600;margin-top:2px;}
.head-titles{text-align:right;position:relative;z-index:1;flex:0 1 auto;min-width:0;}
.head-titles .he-eye{font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;opacity:.72;font-weight:600;}
.head-titles .he-title{font-family:var(--f-display);font-weight:600;font-size:clamp(19px,2.3vw,27px);letter-spacing:.005em;margin-top:3px;text-transform:uppercase;}
.head-titles .he-title em{font-family:var(--f-serif);font-style:italic;font-weight:500;text-transform:none;color:#bcd6f2;}

/* ---- layout ---- */
.grid{display:grid;grid-template-columns:1fr;gap:20px;margin-top:22px;}
@media(min-width:1020px){.grid{grid-template-columns:minmax(0,.86fr) minmax(0,1.14fr);align-items:start;}}
.grid > *{min-width:0;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.panel-pad{padding:24px 24px 26px;}
@media(min-width:1020px){.inputs-col{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto;scrollbar-width:thin;border-radius:var(--radius);}}

.block + .block{margin-top:24px;padding-top:22px;border-top:1px solid var(--line);}
.section-label{
  font-family:var(--f-body);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-faint);margin:0 0 14px;display:flex;align-items:center;gap:10px;
}
.section-label b{color:var(--royal);font-weight:700;}
.section-label::before{content:"";width:20px;height:2px;border-radius:2px;background:var(--royal);}

/* ---- sliders ---- */
.sld{margin-bottom:15px;}
.sld:last-child{margin-bottom:0;}
.sld-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:10px;}
.sld-label{font-size:14.5px;font-weight:600;color:var(--ink-soft);}
.sld-val{font-family:var(--f-display);font-weight:600;font-size:19px;color:var(--navy-700);letter-spacing:.01em;white-space:nowrap;}
.rng{-webkit-appearance:none;appearance:none;width:100%;height:18px;background:transparent;cursor:pointer;display:block;}
.rng::-webkit-slider-runnable-track{
  height:5px;border-radius:999px;
  background:linear-gradient(to right,var(--fill,var(--royal)) var(--pct,50%),var(--line-strong) var(--pct,50%));
}
.rng::-moz-range-track{height:5px;border-radius:999px;background:var(--line-strong);}
.rng::-moz-range-progress{height:5px;border-radius:999px;background:var(--fill,var(--royal));}
.rng::-webkit-slider-thumb{
  -webkit-appearance:none;width:17px;height:17px;border-radius:50%;
  background:#fff;border:3.5px solid var(--fill,var(--royal));margin-top:-6px;
  box-shadow:0 2px 6px rgba(11,39,71,.3);transition:transform .1s;
}
.rng::-webkit-slider-thumb:active{transform:scale(1.15);}
.rng::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:3.5px solid var(--fill,var(--royal));box-shadow:0 2px 6px rgba(11,39,71,.3);}
.sld-note{font-size:12.5px;color:var(--ink-faint);font-weight:500;line-height:1.5;margin-top:6px;}

/* ---- seg buttons ---- */
.seg{display:flex;gap:7px;flex-wrap:wrap;}
.seg.cols-4{display:grid;grid-template-columns:repeat(4,1fr);}
.seg-btn{
  font-family:var(--f-body);font-weight:600;font-size:14px;color:var(--ink-soft);
  background:var(--panel-2);border:1.5px solid var(--line);border-radius:11px;padding:10px 6px;
  cursor:pointer;transition:all .14s;text-align:center;line-height:1.18;
}
.seg-btn small{display:block;font-size:11.5px;font-weight:600;color:var(--ink-faint);margin-top:2px;}
.seg-btn:hover:not(.active){border-color:var(--line-strong);}
.seg-btn.active{background:var(--navy-700);border-color:var(--navy-700);color:#fff;box-shadow:0 8px 18px -10px var(--navy-700);}
.seg-btn.active small{color:rgba(255,255,255,.8);}

/* ---- select ---- */
.select-wrap{position:relative;}
.select-wrap select{
  width:100%;font-family:var(--f-body);font-size:15px;font-weight:600;color:var(--ink);
  background:var(--field);border:1.5px solid var(--field-line);border-radius:var(--radius-sm);
  padding:12px 36px 12px 13px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
.select-wrap::after{content:"";position:absolute;right:14px;top:50%;width:7px;height:7px;border-right:2px solid var(--ink-faint);border-bottom:2px solid var(--ink-faint);transform:translateY(-70%) rotate(45deg);pointer-events:none;}
.select-wrap select:focus{border-color:var(--royal);box-shadow:0 0 0 3px color-mix(in srgb,var(--royal) 16%,transparent);}

/* ---- alloc bar ---- */
.alloc-bar{display:flex;height:8px;border-radius:999px;overflow:hidden;background:var(--line);margin:2px 0 14px;}
.alloc-bar > span{transition:width .3s ease;}

/* ---- toggles ---- */
.toggle-row{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--panel-2);border:1.5px solid var(--line);border-radius:var(--radius-sm);cursor:pointer;user-select:none;}
.toggle-row + .toggle-row{margin-top:9px;}
.toggle-row .tg{width:42px;height:24px;border-radius:99px;background:var(--line-strong);position:relative;transition:background .15s;flex:none;}
.toggle-row .tg::after{content:"";position:absolute;top:2.5px;left:2.5px;width:19px;height:19px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.22);}
.toggle-row.on .tg{background:var(--navy-600);}
.toggle-row.on .tg::after{transform:translateX(18px);}
.toggle-row .tg-label{font-size:14.5px;font-weight:600;color:var(--ink-soft);line-height:1.3;}
.toggle-row .tg-label small{display:block;font-weight:500;font-size:12.5px;color:var(--ink-faint);margin-top:1px;}

/* ---- result hero ---- */
.result-hero{background:linear-gradient(140deg,#091f3b 0%,#10325e 55%,#1b4d90 100%);color:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:26px 26px 24px;position:relative;overflow:hidden;}
.result-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 88% -10%,rgba(120,170,230,.3),transparent 48%),radial-gradient(circle at 0% 120%,rgba(31,96,170,.42),transparent 52%);pointer-events:none;}
.rh-inner{position:relative;z-index:1;}
.rh-label{font-size:13.5px;letter-spacing:.18em;text-transform:uppercase;opacity:.85;font-weight:600;}
.rh-amount{font-family:var(--f-display);font-weight:700;font-size:74px;line-height:.95;letter-spacing:-.01em;margin:8px 0 4px;}
.rh-amount .per{font-size:21px;font-weight:500;opacity:.72;letter-spacing:.01em;text-transform:uppercase;}
.rh-sub{font-size:16.5px;opacity:.92;font-weight:500;}
.rh-sub em{font-family:var(--f-serif);font-style:italic;color:#bcd6f2;}
.rh-chips{display:flex;gap:9px;margin-top:17px;flex-wrap:wrap;}
.rh-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.17);border-radius:12px;padding:9px 14px;font-size:12.5px;font-weight:600;letter-spacing:.02em;}
.rh-chip b{font-family:var(--f-display);font-weight:600;display:block;font-size:20px;margin-top:2px;letter-spacing:.01em;}

/* ---- breakdown (where commission goes) ---- */
.split-bar{display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--panel-2);margin:0 0 16px;}
.split-seg{height:100%;transition:width .35s ease;}
.breakdown{display:flex;flex-direction:column;}
.bd-row{display:flex;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid var(--line);}
.bd-row:last-child{border-bottom:none;}
.bd-dot{width:12px;height:12px;border-radius:3px;flex:none;}
.bd-name{font-size:16px;font-weight:600;color:var(--ink-soft);flex:1;}
.bd-name small{display:block;font-weight:500;font-size:12.5px;color:var(--ink-faint);margin-top:1px;}
.bd-val{font-family:var(--f-display);font-weight:600;font-size:21px;color:var(--ink);letter-spacing:.01em;white-space:nowrap;}
.bd-row.total{border-top:2px solid var(--line-strong);margin-top:5px;padding-top:13px;}
.bd-row.total .bd-name{color:var(--ink);font-weight:700;font-size:17px;}
.bd-row.total .bd-val{font-size:28px;color:var(--navy-700);}

/* ---- subcards ---- */
.subcard{background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:18px 19px;}
.sc-head{display:flex;align-items:center;justify-content:space-between;gap:10px 12px;margin-bottom:14px;flex-wrap:wrap;}
.sc-title{font-family:var(--f-display);font-weight:600;font-size:19px;color:var(--ink);text-transform:uppercase;letter-spacing:.02em;}
.sc-title em{font-family:var(--f-serif);font-style:italic;font-weight:500;text-transform:none;color:var(--royal);letter-spacing:0;}
.sc-tag{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);background:var(--panel);border:1px solid var(--line);padding:5px 10px;border-radius:9px;white-space:nowrap;flex:none;}

/* ---- funnel ---- */
.funnel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:660px){.funnel-grid{grid-template-columns:1fr;}}
.fun{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.fun-head{padding:15px 17px 13px;color:#fff;display:flex;justify-content:space-between;align-items:flex-end;gap:10px;}
.fun.navy .fun-head{background:linear-gradient(135deg,#0e2f57,#123461);}
.fun.royal .fun-head{background:linear-gradient(135deg,#1f60aa,#2f78c8);}
.fun-head .fh-side{font-family:var(--f-display);font-weight:600;font-size:16px;letter-spacing:.04em;text-transform:uppercase;}
.fun-head .fh-pct{font-size:12px;font-weight:600;opacity:.8;margin-top:1px;}
.fun-head .fh-gci{font-family:var(--f-display);font-weight:600;font-size:17px;text-align:right;}
.fun-head .fh-gci small{display:block;font-family:var(--f-body);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.75;}
.fun-rows{padding:5px 17px 12px;}
.frow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.frow:last-child{border-bottom:none;}
.frow .frl{font-size:13.5px;font-weight:600;color:var(--ink-soft);}
.frow .frl small{display:block;font-size:11.5px;font-weight:500;color:var(--ink-faint);}
.frow .frv{font-family:var(--f-display);font-weight:600;font-size:22px;color:var(--ink);}
.frow.hl .frl{color:var(--royal);font-weight:700;}
.frow.hl .frv{color:var(--royal);font-size:26px;}

/* ---- cadence ---- */
.cad-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:660px){.cad-grid{grid-template-columns:1fr;}}
.cad{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px;}
.cad-title{font-family:var(--f-display);font-weight:600;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.cad-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13.5px;color:var(--ink-soft);font-weight:600;}
.cad-row strong{font-family:var(--f-display);font-size:18px;font-weight:600;color:var(--ink);}
.cad-row.hl{border-top:1px solid var(--line);margin-top:4px;padding-top:10px;}
.cad-row.hl span{color:var(--royal);font-weight:700;}
.cad-row.hl strong{color:var(--royal);font-size:21px;}

.grand-total{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:14px;padding:16px 20px;background:linear-gradient(135deg,#0e2f57,#1b4d90);color:#fff;border-radius:14px;position:relative;overflow:hidden;}
.grand-total::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 92% -30%,rgba(120,170,230,.35),transparent 55%);pointer-events:none;}
.grand-total .gt-l{position:relative;}
.grand-total .gt-l > span{font-family:var(--f-display);font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.03em;display:block;}
.grand-total .gt-l > small{font-size:12px;font-weight:500;opacity:.8;}
.grand-total b{position:relative;font-family:var(--f-display);font-weight:700;font-size:38px;letter-spacing:-.01em;white-space:nowrap;}
.grand-total b .per{font-size:15px;font-weight:500;opacity:.75;}

/* ---- meta bar ---- */
.meta-bar{display:flex;align-items:center;gap:0;margin-top:22px;background:linear-gradient(135deg,#091f3b,#143c72);color:#fff;border-radius:var(--radius);padding:16px 24px;box-shadow:var(--shadow);flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:11px;padding:4px 22px;}
.meta-item:first-child{padding-left:0;}
.meta-ic{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.35);display:grid;place-items:center;flex:none;}
.meta-ic svg{width:17px;height:17px;stroke:#fff;}
.meta-item .mt{font-size:13px;font-weight:500;opacity:.92;line-height:1.4;}
.meta-item .mt b{display:block;font-family:var(--f-display);font-weight:600;font-size:15px;opacity:1;letter-spacing:.02em;text-transform:uppercase;}
.disclaim{font-size:11.5px;color:var(--ink-faint);line-height:1.6;font-weight:500;margin-top:14px;text-align:center;max-width:840px;margin-left:auto;margin-right:auto;}

/* ---- sticky CTA ---- */
.sticky-cta{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:60;display:flex;align-items:center;gap:16px;background:rgba(8,24,46,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line-strong);border-radius:99px;padding:9px 10px 9px 22px;box-shadow:0 18px 44px -14px rgba(0,0,0,.6);max-width:calc(100vw - 28px);}
.scta-text{display:flex;flex-direction:column;line-height:1.25;white-space:nowrap;}
.scta-text > b{font-family:var(--f-display);font-weight:600;font-size:14.5px;text-transform:uppercase;letter-spacing:.04em;color:#fff;}
.scta-text > span{font-size:11.5px;font-weight:600;color:var(--royal-soft);}
.scta-ghost{font-family:var(--f-display);font-weight:600;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:#fff;padding:11px 6px;white-space:nowrap;transition:color .14s;}
.scta-ghost:hover{color:var(--royal-soft);}
.scta-btn{font-family:var(--f-display);font-weight:600;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--royal),var(--royal-bright));border-radius:99px;padding:11px 20px;white-space:nowrap;box-shadow:0 10px 22px -10px var(--royal);transition:filter .14s;display:inline-flex;align-items:center;gap:8px;}
.scta-btn:hover{filter:brightness(1.12);}
.scta-btn svg{width:15px;height:15px;}

.toast{
  position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--navy-900);color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:all .2s;z-index:80;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---- responsive ---- */
@media(max-width:760px){
  .app-head{padding:20px 20px 22px;flex-direction:column;align-items:flex-start;gap:14px;}
  .head-titles{text-align:left;}
  .brand-lockup img.logo{height:40px;}
  .rh-amount{font-size:58px;}
  .scta-text{display:none;}
}
@media print{
  body{background:#fff;font-size:13px;}
  .sticky-cta,.toast{display:none !important;}
  .inputs-col{display:none !important;}
  .grid{grid-template-columns:1fr;margin-top:14px;}
  .app-head,.panel,.result-hero,.meta-bar,.grand-total{box-shadow:none;}
  .panel{break-inside:avoid;}
  .app-wrap{padding-bottom:20px;}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast">Link copied</div>

<script src="engine.js"></script>
<script src="plan.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="app-v2.jsx"></script>
</body>
</html>
