<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  function Frame({ src }) {
    return <iframe className="frame-iframe" src={src} title={src}></iframe>;
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="directions" title="Commission Split Calculator" subtitle="Three directions — same engine, same brand. Open any one fullscreen (focus icon) to use it live.">
          <DCArtboard id="a" label="A · Spotlight — bold dark, hero number" width={1180} height={940}>
            <Frame src="Direction%20A%20-%20Spotlight.html" />
          </DCArtboard>
          <DCArtboard id="b" label="B · Ledger — light fintech statement" width={1240} height={940}>
            <Frame src="Direction%20B%20-%20Ledger.html" />
          </DCArtboard>
          <DCArtboard id="c" label="C · Recruit Card — friendly, shareable" width={760} height={1180}>
            <Frame src="Direction%20C%20-%20Recruit%20Card.html" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
